          description: 查询日期，默认今天
        - name: view
          in: query
          schema:
            type: string
            enum: [day, week]
            default: day
        - name: groupUuid
          in: query
          schema:
            type: string
        - name: tagIds
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ScheduleBoardVO'

